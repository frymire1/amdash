<mat-card class="patient-card" (click)="select.emit(patient)" role="button" tabindex="0">
  <mat-card-header>
    <mat-card-title>{{ patient.name }}</mat-card-title>
    <mat-card-subtitle>Healthcare #{{ patient.healthcareNumber }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div class="patient-info">
      <p><strong>Gender:</strong> {{ patient.gender }}</p>
      <p><strong>Age:</strong> {{ patient.age }}</p>
    </div>
  </mat-card-content>
</mat-card>
