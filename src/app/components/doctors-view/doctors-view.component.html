<mat-sidenav-container class="doctors-view-container">
  <mat-sidenav #patientNav mode="over" class="patient-sidenav">
    <app-patient-list (selected)="onPatientSelected($event); patientNav.close()"></app-patient-list>
  </mat-sidenav>

  <div class="view-content">
    <button mat-raised-button color="primary" class="mobile-patient-list-button" (click)="patientNav.open()" aria-label="Open patient list">
      <mat-icon>people</mat-icon>
      <span class="mobile-button-label">Patient List</span>
    </button>

    <div class="active-patient-section">
      <app-patient-viewer [patient]="selectedPatient"></app-patient-viewer>
    </div>

    <div class="patient-list-section desktop-only">
      <app-patient-list (selected)="onPatientSelected($event)"></app-patient-list>
    </div>
  </div>
</mat-sidenav-container>
