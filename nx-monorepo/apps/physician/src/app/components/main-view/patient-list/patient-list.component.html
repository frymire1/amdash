<div class="patient-list-container">
  <h2>Patient List</h2>
  @if (patients().length > 0) {
    <div class="patients-grid">
      @for (patient of patients(); track patient.healthcareNumber) {
        <app-patient-card
          (select)="onPatientSelect(patient)"
          [patient]="patient"
          [isTracked]="isTracked(patient)"
        ></app-patient-card>
      }
    </div>
  } @else {
    <p class="empty-state">No patients uploaded yet.</p>
  }
</div>
