<div class="patient-summary-card">
  <div class="patient-summary-card__header">
    <div class="patient-summary-card__title">{{ uploaded.patient.name }}</div>
    <div class="patient-summary-card__subtitle">
      Healthcare #{{ uploaded.patient.healthcareNumber }}
    </div>
  </div>
  <div class="patient-summary-card__details">
    <span>{{ uploaded.patient.gender }}</span>
    <span>{{ uploaded.patient.age }} yrs</span>
    <span>{{ uploaded.patient.vitals.heartRate }} bpm</span>
  </div>
  @if (deleteError()) {
    <p class="patient-summary-card__error">{{ deleteError() }}</p>
  }

  <div class="patient-summary-card__actions">
    <a mat-stroked-button color="primary" [routerLink]="['/upload', uploaded.id]">
      <mat-icon>edit</mat-icon>
      Edit
    </a>
    <button
      mat-stroked-button
      [color]="isTracking() ? 'warn' : 'primary'"
      (click)="toggleTracking()"
    >
      <mat-icon>{{ isTracking() ? 'location_off' : 'location_on' }}</mat-icon>
      {{ isTracking() ? 'Stop Sharing' : 'Share Location' }}
    </button>
    <button mat-stroked-button color="warn" [disabled]="deleting()" (click)="deletePatient()">
      <mat-icon>delete</mat-icon>
      {{ deleting() ? 'Deleting…' : 'Delete' }}
    </button>
  </div>
</div>
