<mat-toolbar class="nav-bar">
  <a class="brand" routerLink="/">AmDash</a>
  <span class="spacer"></span>

  @if (authService.isAuthenticated()) {
    <a
      class="user-avatar"
      [class.user-avatar--initials]="userProfileService.initials()"
      [class.user-avatar--placeholder]="!userProfileService.initials()"
      routerLink="/user-settings"
      aria-label="Account settings"
      title="Account settings"
    >
      @if (userProfileService.initials()) {
        {{ userProfileService.initials() }}
      } @else {
        <mat-icon>account_circle</mat-icon>
      }
    </a>
  } @else {
    <span class="user-avatar user-avatar--placeholder" title="Not logged in">
      <mat-icon>account_circle</mat-icon>
    </span>
  }

  @if (authService.isAuthenticated()) {
    <button mat-icon-button (click)="logOut()" aria-label="Log out" title="Log out">
      <mat-icon>logout</mat-icon>
    </button>
  }
</mat-toolbar>
