<div class="login-container">
  <div class="login-card">
    <h1 class="login-card__brand">AmDash</h1>
    <p class="login-card__subtitle">{{ mode() === 'signup' ? 'Create an account' : 'Sign in to continue' }}</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" required autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input
          matInput
          type="password"
          formControlName="password"
          required
          [autocomplete]="mode() === 'signup' ? 'new-password' : 'current-password'"
        />
      </mat-form-field>

      @if (mode() === 'signin') {
        <button
          type="button"
          class="login-card__forgot-password"
          mat-button
          [disabled]="resetSubmitting()"
          (click)="onForgotPassword()"
        >
          {{ resetSubmitting() ? 'Sending…' : 'Forgot password?' }}
        </button>
      }

      @if (errorMessage()) {
        <p class="login-card__error">{{ errorMessage() }}</p>
      }

      @if (resetMessage()) {
        <p class="login-card__success">{{ resetMessage() }}</p>
      }

      <button mat-raised-button color="primary" type="submit" [disabled]="submitting()">
        @if (submitting()) {
          {{ mode() === 'signup' ? 'Creating account…' : 'Signing in…' }}
        } @else {
          {{ mode() === 'signup' ? 'Create Account' : 'Sign In' }}
        }
      </button>

      <button type="button" class="login-card__toggle-mode" mat-button (click)="toggleMode()">
        {{ mode() === 'signup' ? 'Already have an account? Sign in' : "Don't have an account? Create one" }}
      </button>
    </form>
  </div>
</div>
